global
    daemon

defaults
    mode tcp
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms

frontend tcp_front
    bind *:9000
    default_backend tcp_back

backend tcp_back
    balance roundrobin
    server backend1 backend1:5000 check
    server backend2 backend2:5000 check
    server backend3 backend3:5000 check
